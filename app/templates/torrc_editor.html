{% extends "base.html" %}
{% block content %}
<h2 class="mb-4"><i class="bi-file-earmark-text me-2"></i>Torrc</h2>
<div class="card"><div class="card-body">
<form method="POST" action="/torrc/save">
<div class="mb-3"><textarea name="torrc_content" class="form-control font-monospace" rows="24" spellcheck="false">{% if torrc_content %}{{ torrc_content }}{% endif %}</textarea></div>
<div class="btn-group gap-2">
<button type="submit" class="btn btn-primary"><i class="bi-save me-1"></i>Save & Reload</button>
<button type="submit" formaction="/torrc/default" class="btn btn-warning" onclick="return confirm('Restore default?')"><i class="bi-arrow-counterclockwise me-1"></i>Restore Default</button>
<a href="/torrc/download" class="btn btn-info"><i class="bi-download me-1"></i>Download</a>
</div>
</form>
<hr>
<form method="POST" action="/torrc/upload" enctype="multipart/form-data">
<div class="input-group"><input type="file" name="torrc_file" class="form-control" accept=".torrc,.txt"><button type="submit" class="btn btn-secondary"><i class="bi-upload me-1"></i>Upload</button></div>
</form>
</div></div>
{% endblock %}
