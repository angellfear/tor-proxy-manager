<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tor Proxy Manager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>body{background:#1a1a2e;height:100vh;display:flex;align-items:center}.login-card{max-width:400px;width:100%}</style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="login-card">
      <div class="card shadow">
        <div class="card-body p-4">
          <div class="text-center mb-4"><i class="bi-shield-lock-fill" style="font-size:3rem;color:#0d6efd"></i><h3 class="mt-2">Tor Proxy Manager</h3></div>
          {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
          <form method="POST">
            <div class="mb-3"><label class="form-label">Username</label><input type="text" name="username" class="form-control" required autofocus></div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
          </form>
          <div class="mt-3 text-center text-muted small">Default: admin / admin123</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
